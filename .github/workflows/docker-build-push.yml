name: Reusable - Docker Build & Push

# Build e push de imagem para ghcr.io/criaelo/<repo>:<tag>.
on:
  workflow_call:
    inputs:
      image:
        type: string
        required: true
      tag:
        type: string
        required: true
      context:
        type: string
        default: "."
      dockerfile:
        type: string
        default: "./Dockerfile"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ghcr.io/criaelo/${{ inputs.image }}:${{ inputs.tag }}
            ghcr.io/criaelo/${{ inputs.image }}:${{ inputs.tag }}-${{ github.sha }}
